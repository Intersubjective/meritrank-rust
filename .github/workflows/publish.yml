name: Publish
on:
  workflow_dispatch: 
jobs:
  test_core:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: "1"
    defaults:
      run:
        working-directory: ./core
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        cargo test -- --skip smoke_memory
  test_service:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: "1"
    defaults:
      run:
        working-directory: ./service
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        export MERITRANK_NUM_WALKS=50
        cargo test
  test_psql_connector:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/intersubjective/pgrx-toolchain:pg17-pgrx0.17.0
    permissions:
      packages: read
    env:
      RUST_BACKTRACE: "1"
      # pgrx init ran as root in the toolchain image; GHA may set HOME elsewhere
      PGRX_HOME: /root/.pgrx
    defaults:
      run:
        working-directory: ./psql-connector
    steps:
    - uses: actions/checkout@v4
    - name: Build the connector
      run: cargo build
    - name: Build the service (release; server is started in Do the tests)
      working-directory: ./service
      run: cargo build --release
    - name: Install sudo and netcat (for cargo pgrx and service port check)
      run: apk add --no-cache sudo netcat-openbsd
    - name: Configure passwordless sudo (avoid pgrx 'sudo cp' hanging non-interactively)
      run: |
        mkdir -p /etc/sudoers.d
        echo 'Defaults !requiretty' > /etc/sudoers.d/nopasswd
        echo 'Defaults env_keep += "MERITRANK_SERVICE_URL"' >> /etc/sudoers.d/nopasswd
        echo 'root ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers.d/nopasswd
        chmod 440 /etc/sudoers.d/nopasswd
    - name: Start meritrank service
      working-directory: ./service
      run: |
        export MERITRANK_SERVER_PORT=10234 MERITRANK_SERVER_ADDRESS=127.0.0.1 MERITRANK_NUM_WALKS=500
        nohup ./target/release/meritrank_service >> /tmp/meritrank.log 2>&1 &
        i=0; while [ $i -lt 30 ]; do nc -z 127.0.0.1 10234 && break; i=$((i+1)); sleep 1; done
        nc -z 127.0.0.1 10234 || (echo "Meritrank service did not start"; cat /tmp/meritrank.log 2>/dev/null; exit 1)
    - name: Do the tests
      run: |
        export RUST_TEST_THREADS=1
        export MERITRANK_SERVICE_URL=tcp://127.0.0.1:10234
        mkdir -p /usr/local/share/postgresql/extension /usr/local/lib/postgresql
        chmod -R a+rwx /usr/local/share/postgresql/extension /usr/local/lib/postgresql 2>/dev/null || true
        mkdir -p target/test-pgdata
        chown -R postgres:postgres target/test-pgdata
        unset PG_VERSION
        nc -z 127.0.0.1 10234 || (echo "Meritrank service died before tests"; cat /tmp/meritrank.log 2>/dev/null; exit 1)
        cargo pgrx test --runas postgres; r=$?
        echo "--- meritrank service log ---"
        cat /tmp/meritrank.log 2>/dev/null || true
        exit $r
  publish_service:
    needs: [ test_core, test_service, test_psql_connector ]
    if: success()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./service
    steps:
    - uses: actions/checkout@v4
    - name: Check version
      id: check_version
      shell: bash
      run: |
        export VER=$(cargo metadata --format-version=1 | jq -r '.packages[] | select(.name=="meritrank_service") | .version')
        echo "VER=$VER"
        if ! [[ "$VER" =~ ^[0-9\.]+$ ]]; then
          echo "IGNORE DEV VERSION"
          echo "SKIP=1" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ $(docker manifest inspect vbulavintsev/meritrank-service:v$VER >/dev/null 2>&1; echo $?) -eq 0 ]; then
          echo "ALREADY PUBLISHED"
          echo "SKIP=1" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "SKIP=0"    >> "$GITHUB_OUTPUT"
        echo "TAG=v$VER" >> "$GITHUB_ENV"
    - name: Build docker image
      if: ${{ steps.check_version.outputs.SKIP == 0 }}
      run: |
        docker build -t vbulavintsev/meritrank-service:$TAG -f ./Dockerfile ..
    - name: Push docker image to Dockerhub
      if: ${{ steps.check_version.outputs.SKIP == 0 }}
      shell: bash
      run: |
        docker login -u vbulavintsev -p ${{ secrets.DOCKERHUB_TOKEN }}
        docker image push vbulavintsev/meritrank-service:$TAG
  publish_connector:
    needs: [ test_core, test_service, test_psql_connector ]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      packages: read
    defaults:
      run:
        working-directory: ./psql-connector
    steps:
    - uses: actions/checkout@v4
    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Check version
      id: check_version
      shell: bash
      run: |
        export VER=$(cargo metadata --format-version=1 | jq -r '.packages[] | select(.name=="pgmer2") | .version')
        echo "VER=$VER"
        if ! [[ "$VER" =~ ^[0-9\.]+$ ]]; then
          echo "IGNORE DEV VERSION"
          echo "SKIP=1" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ $(docker manifest inspect vbulavintsev/postgres-tentura:v$VER >/dev/null 2>&1; echo $?) -eq 0 ]; then
          echo "ALREADY PUBLISHED"
          echo "SKIP=1" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "SKIP=0" >> "$GITHUB_OUTPUT"
        echo "TAG=v$VER" >> "$GITHUB_ENV"
    - name: Set up Docker Buildx
      if: ${{ steps.check_version.outputs.SKIP == 0 }}
      uses: docker/setup-buildx-action@v3
    - name: Log in to Dockerhub
      if: ${{ steps.check_version.outputs.SKIP == 0 }}
      run: docker login -u vbulavintsev -p ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push docker image
      if: ${{ steps.check_version.outputs.SKIP == 0 }}
      uses: docker/build-push-action@v6
      with:
        context: .
        file: psql-connector/Dockerfile
        push: true
        tags: vbulavintsev/postgres-tentura:${{ env.TAG }}
        cache-from: type=gha,scope=psql-connector
        cache-to: type=gha,mode=max,scope=psql-connector
