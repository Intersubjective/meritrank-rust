name: Build and test

on:
  push:
    branches: [ main, dev, legacy ]
  pull_request:
    branches: [ main, dev, legacy ]
  workflow_dispatch: 

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cargo build
    - name: Run tests
      run: |
        cargo test
