name: Build and test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 
jobs:
  test_core_oom:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: "1"
    defaults:
      run:
        working-directory: ./core
    steps:
    - uses: actions/checkout@v4
    - name: Build and run the test
      run: |
        export MERITRANK_NO_ASSERT=1
        export MEM_KB=`/usr/bin/time -f "%M" cargo test smoke_memory --release --quiet 2>&1 1>/dev/null`
        echo "Memory consumption is $MEM_KB KB"
        if [ $MEM_KB -gt 550000 ]; then
          exit 1
        fi
  test_service:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: "1"
    defaults:
      run:
        working-directory: ./service
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build
    - name: Run tests
      run: |
        cargo test --bin meritrank_service
  test_core:
    needs: [ test_core_oom, test_service ]
    if: success()
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: "1"
    defaults:
      run:
        working-directory: ./core
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cargo build
    - name: Run tests
      run: |
        cargo test -- --skip smoke_memory
  test_service_oom:
    needs: [ test_core_oom, test_service ]
    if: success()
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: "1"
    defaults:
      run:
        working-directory: ./service
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --release
    - name: Run OOM tests with memory usage check
      run: |
        export MEM_KB=`/usr/bin/time -f "%M" cargo test --release --quiet --bin meritrank_service oom 2>&1 1>/dev/null`
        echo "Memory consumption is $MEM_KB KB"
        if [ $MEM_KB -gt 2000000 ]; then
          exit 1
        fi
  test_psql_connector:
    needs: [ test_core_oom, test_service ]
    if: success()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/intersubjective/pgrx-toolchain:pg17-pgrx0.17.0
    permissions:
      packages: read
    env:
      RUST_BACKTRACE: "1"
      # pgrx init ran as root in the toolchain image; GHA may set HOME elsewhere
      PGRX_HOME: /root/.pgrx
    defaults:
      run:
        working-directory: ./psql-connector
    steps:
    - uses: actions/checkout@v4
    - name: Build the connector
      run: cargo build
    - name: Build and run the service
      working-directory: ./service
      run: |
        cargo build --release
        export MERITRANK_SERVER_PORT=10234
        export MERITRANK_SERVER_ADDRESS=127.0.0.1
        export MERITRANK_NUM_WALKS=500
        cargo run --release --bin meritrank_service >/dev/null 2>&1 &
    - name: Install sudo (for cargo pgrx install --sudo in container)
      run: apk add --no-cache sudo
    - name: Do the tests
      run: |
        export RUST_TEST_THREADS=1
        export MERITRANK_SERVICE_URL=tcp://127.0.0.1:10234
        mkdir -p /usr/local/share/postgresql/extension /usr/local/lib/postgresql
        chmod -R a+rwx /usr/local/share/postgresql/extension /usr/local/lib/postgresql 2>/dev/null || true
        unset PG_VERSION
        cargo pgrx test --runas postgres
  test_docker_service:
    needs: [ test_core_oom, test_service ]
    if: success()
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./service
    steps:
    - uses: actions/checkout@v4
    - name: Build docker image
      run: |
        docker build -f ./Dockerfile ..
  test_docker_psql_connector:
    needs: [ test_core_oom, test_service ]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      packages: read
    defaults:
      run:
        working-directory: ./psql-connector
    steps:
    - uses: actions/checkout@v4
    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: psql-connector/Dockerfile
        push: false
        cache-from: type=gha,scope=psql-connector
        cache-to: type=gha,mode=max,scope=psql-connector
