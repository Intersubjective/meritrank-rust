# Minimal compose to test postgres-tentura + meritrank locally
services:
  meritrank:
    hostname: meritrank
    image: vbulavintsev/meritrank-service:v0.4.0
    restart: "no"
    networks:
      - backend
    environment:
      - "MERITRANK_SERVICE_ADDRESS=0.0.0.0"
      - "MERITRANK_SERVICE_URL=tcp://meritrank:10234"
      - "MERITRANK_SERVICE_PORT=10234"
      - "MERITRANK_SERVER_ADDRESS=0.0.0.0"
      - "MERITRANK_SERVER_PORT=10234"

  postgres:
    hostname: postgres
    image: vbulavintsev/postgres-tentura:v0.4.0
    restart: "no"
    depends_on:
      - meritrank
    networks:
      - backend
    environment:
      - POSTGRES_PASSWORD=postgres
      - "MERITRANK_SERVICE_URL=tcp://meritrank:10234"
    command: >-
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
    ports:
      - "5432:5432"

networks:
  backend:
    driver: bridge
